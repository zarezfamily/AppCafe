<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etiove Comunidad</title>
  <meta name="description" content="Comunidad Etiove: comparte hilos y respuestas sobre cafe de especialidad." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1c120d;
      --ink-soft: #5d4030;
      --ink-muted: #8b7355;
      --cream: #f6efe7;
      --cream-alt: #fffaf5;
      --accent: #8f5e3b;
      --accent-deep: #5d4030;
      --border: #e4d3c2;
      --danger: #a44f45;
      --success: #4f7a53;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }
    .container {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: 24px 0 48px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      letter-spacing: 2px;
      font-weight: 800;
      color: var(--ink);
      text-decoration: none;
    }
    .tagline {
      font-family: 'Playfair Display', serif;
      color: var(--ink-soft);
      font-size: 16px;
      font-style: italic;
    }
    .home-link {
      text-decoration: none;
      color: var(--accent-deep);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--cream-alt);
      font-weight: 600;
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
    }
    .card {
      background: var(--cream-alt);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(28, 18, 13, 0.05);
    }
    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .muted { color: var(--ink-muted); font-size: 13px; }
    .auth-row { display: flex; gap: 8px; margin-top: 10px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--ink);
    }
    textarea { min-height: 90px; resize: vertical; }
    .field { margin-top: 10px; }
    .btn {
      border: 1px solid var(--accent-deep);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    .btn.primary { background: var(--accent-deep); color: #fff8f0; }
    .btn.ghost { background: transparent; color: var(--accent-deep); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .status { margin-top: 10px; font-size: 12px; }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--success); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 14px; }
    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      background: #fff;
      cursor: pointer;
      color: var(--ink-soft);
    }
    .chip.active { background: var(--accent-deep); border-color: var(--accent-deep); color: #fff8f0; }
    .thread {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      margin-top: 10px;
    }
    .thread h3 { font-size: 16px; margin-bottom: 6px; color: var(--ink); }
    .meta { font-size: 12px; color: var(--ink-muted); margin-bottom: 8px; }
    .thread p { font-size: 14px; color: var(--ink-soft); line-height: 1.5; white-space: pre-wrap; }
    .thread-foot { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    .link-btn {
      border: 0;
      background: transparent;
      color: var(--accent-deep);
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }
    .reply-box { margin-top: 10px; }
    .reply { border-top: 1px dashed var(--border); padding-top: 8px; margin-top: 8px; }
    .thread-image, .reply-image {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-top: 10px;
      max-height: 320px;
      object-fit: cover;
      background: #f3ece4;
    }
    .reply-image { max-height: 220px; }
    .actions-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .file-note {
      font-size: 11px;
      color: var(--ink-muted);
      margin-top: 6px;
    }
    .empty { margin-top: 16px; color: var(--ink-muted); font-size: 14px; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div>
        <a class="brand" href="/">ETIOVE</a>
        <div class="tagline">Donde nació el café</div>
      </div>
      <a class="home-link" href="/">Volver a la web</a>
    </div>

    <div class="grid">
      <aside class="card">
        <h2>Acceso</h2>
        <p class="muted">Inicia sesión para crear hilos y responder. Lectura pública para todos.</p>

        <div class="field"><input id="email" type="email" placeholder="tu@email.com" /></div>
        <div class="field"><input id="password" type="password" placeholder="Contraseña" /></div>
        <div class="auth-row">
          <button class="btn primary" id="loginBtn">Entrar</button>
          <button class="btn ghost" id="registerBtn">Crear cuenta</button>
          <button class="btn ghost" id="logoutBtn" style="display:none">Salir</button>
        </div>
        <div id="authStatus" class="status"></div>

        <h2 style="margin-top:20px">Nuevo hilo</h2>
        <div class="field"><select id="categorySelect"></select></div>
        <div class="field"><input id="threadTitle" maxlength="120" placeholder="Título (3-120)" /></div>
        <div class="field"><textarea id="threadBody" maxlength="1000" placeholder="Contenido (3-1000)"></textarea></div>
        <div class="field"><input id="threadImage" type="file" accept="image/*" /></div>
        <div class="file-note">Opcional: imagen para el hilo</div>
        <button class="btn primary" id="createThreadBtn">Publicar hilo</button>
        <div id="threadStatus" class="status"></div>
      </aside>

      <main class="card">
        <h2>Comunidad Etiove</h2>
        <p class="muted">Misma comunidad de la app. Lo que publiques aquí aparece también en iOS/Android.</p>

        <div class="chips" id="categoryChips"></div>
        <button class="btn ghost" id="refreshBtn">Recargar</button>

        <div id="threadsWrap"></div>
      </main>
    </div>
  </div>

  <script src="./community.js"></script>
</body>
</html>
