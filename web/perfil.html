<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil de la comunidad | Etiove</title>
  <meta name="description" content="Perfil público de la comunidad Etiove con actividad en foro y blog." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1c120d;
      --ink-soft: #61584e;
      --ink-muted: #9a7963;
      --muted: #8a8177;
      --line: #ddd7d0;
      --shell: #efefef;
      --card: #f4f4f5;
      --white: #ffffff;
      --accent: #8f5e3b;
      --accent-soft: #e4d3c2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f6f6f7 0%, #ececed 260px, #f2f2f3 100%);
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px;
      background: rgba(246, 239, 231, 0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(228, 211, 194, 0.5);
    }
    .nav-wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 500; letter-spacing: 4px;
      color: var(--ink); text-decoration: none; text-transform: uppercase;
    }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-link {
      font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
      color: var(--ink-muted); text-decoration: none; transition: color 0.3s;
    }
    .nav-link:hover, .nav-link--active { color: var(--accent); }
    .nav-cta {
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
      color: #fffaf5; background: var(--ink); text-decoration: none;
      padding: 10px 20px; border-radius: 3px; transition: background 0.3s;
    }
    .nav-cta:hover { background: #5d4030; }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 96px 16px 60px;
    }

    .profile-card {
      background: radial-gradient(circle at 86% -12%, rgba(209, 139, 74, 0.22), transparent 46%), linear-gradient(160deg, #261811 0%, #1f140f 62%, #2a1a13 100%);
      border: 1px solid #4e3426;
      border-radius: 20px;
      padding: 18px 16px 18px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(16, 10, 7, 0.3);
    }

    .profile-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 0 100%, rgba(255, 233, 210, 0.09), transparent 44%);
      pointer-events: none;
    }

    .profile-card::after {
      content: '';
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      right: -42px;
      top: -56px;
      background: rgba(209, 139, 74, 0.12);
      pointer-events: none;
    }

    .member-kicker {
      margin: 0 0 8px;
      color: #d4a574;
      letter-spacing: 1.5px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin: 0 auto 8px;
      border: 3px solid rgba(255, 248, 240, 0.94);
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
      background: linear-gradient(145deg, #6e5f4f, #aa967e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fffdf8;
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .avatar.editable {
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .avatar.editable:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.2);
    }

    .profile-name {
      margin: 0;
      font-size: clamp(24px, 3.2vw, 34px);
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      color: #fff8f0;
      position: relative;
      z-index: 1;
      line-height: 1.1;
    }

    .profile-sub {
      margin: 5px 0 7px;
      color: #f4dfc8;
      font-size: clamp(13px, 1.3vw, 17px);
      font-weight: 700;
      letter-spacing: 0.2px;
      position: relative;
      z-index: 1;
    }

    .profile-counts {
      margin: 3px auto 0;
      font-size: clamp(12px, 1.1vw, 14px);
      color: #fff7ec;
      font-weight: 700;
      border: 1px solid #6a4a37;
      border-radius: 999px;
      background: rgba(255, 245, 230, 0.08);
      padding: 6px 12px;
      width: fit-content;
      position: relative;
      z-index: 1;
    }

    .profile-counts span {
      color: #d0baa3;
      font-weight: 700;
      margin: 0 4px;
    }

    .profile-followers {
      margin-top: 6px;
      color: #f0dac2;
      font-size: 12px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .profile-quote {
      margin: 12px auto 0;
      max-width: 700px;
      color: #fff6eb;
      font-size: clamp(13px, 1.15vw, 17px);
      font-weight: 500;
      position: relative;
      z-index: 1;
      line-height: 1.5;
    }

    .avatar-hint {
      margin: 8px 0 0;
      color: #ddc1a6;
      font-size: 11px;
      letter-spacing: 0.4px;
      font-weight: 700;
      position: relative;
      z-index: 1;
      min-height: 16px;
    }

    .profile-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 14px 0 0;
      position: relative;
      z-index: 1;
    }

    .profile-owner-tools {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .pill-btn {
      border: 1px solid #b38766;
      background: #8f5e3b;
      color: #fff5ea;
      border-radius: 999px;
      min-width: 210px;
      padding: 9px 15px;
      font-size: clamp(13px, 1.1vw, 16px);
      font-weight: 800;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.18);
    }

    .pill-btn:hover:not(:disabled) { background: #7e4e2c; }

    .pill-btn:disabled {
      cursor: not-allowed;
      opacity: 0.56;
    }

    .owner-btn {
      border: 1px solid #ccad90;
      background: #faf8f5;
      color: #5f4128;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.3px;
      cursor: pointer;
    }

    .owner-btn:hover { border-color: #b88f68; color: #9f612a; }

    .profile-status {
      margin-top: 9px;
      color: #e6cfb5;
      font-size: 12px;
      font-weight: 700;
      min-height: 18px;
      position: relative;
      z-index: 1;
    }

    .tabs {
      display: flex;
      gap: 10px;
      overflow: auto;
      scrollbar-width: none;
      margin: 18px 0 14px;
      border-bottom: 2px solid #d5d1cb;
      padding-bottom: 2px;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      border: 0;
      background: transparent;
      color: #6f665d;
      padding: 12px 8px 10px;
      font-weight: 700;
      font-size: 17px;
      white-space: nowrap;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }

    .tab-btn.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    .feed {
      display: grid;
      gap: 10px;
    }

    .feed-item {
      background: #fafafa;
      border: 1px solid #dfd9d2;
      border-radius: 16px;
      display: grid;
      grid-template-columns: 108px 1fr;
      overflow: hidden;
      min-height: 110px;
    }

    .feed-thumb {
      background: linear-gradient(165deg, #dad3ca, #f2ece4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #847765;
      font-size: 32px;
      font-weight: 800;
    }

    .feed-body {
      padding: 14px 16px;
    }

    .feed-meta {
      margin: 0 0 8px;
      color: #75695d;
      font-size: 14px;
      font-weight: 600;
    }

    .feed-title {
      margin: 0;
      font-size: 19px;
      font-size: clamp(14px, 1.4vw, 19px);
      line-height: 1.45;
      color: #1f1b16;
    }

    .feed-aux {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .mini-btn {
      border: 1px solid #ccbcae;
      background: #fffaf3;
      color: #6d4f31;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .mini-btn:hover { border-color: #b08255; color: #8e4f1d; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    .stat-card {
      background: #fafafa;
      border: 1px solid #dfd9d2;
      border-radius: 14px;
      padding: 14px;
    }

    .stat-label {
      margin: 0;
      color: #7f7468;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 700;
    }

    .stat-value {
      margin: 6px 0 0;
      font-size: 28px;
      font-weight: 800;
      color: #211e1a;
    }

    .empty-state {
      border: 1px dashed #cebfb1;
      background: #fff9f3;
      color: #7b6b5d;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      font-weight: 600;
    }

    @media (max-width: 760px) {
      nav { padding: 16px 24px; }
      .nav-links { gap: 20px; }
      .nav-cta { display: none; }
      .feed-item { grid-template-columns: 1fr; }
      .feed-thumb { min-height: 76px; }
      .profile-card {
        border-radius: 18px;
        padding: 16px 13px;
      }
      .pill-btn { min-width: 100%; }
    }

    @media (max-width: 560px) {
      nav { padding: 14px 20px; }
      .nav-link:not(.nav-link--active) { display: none; }
    }
  </style>
</head>
<body>
  <nav aria-label="Navegación principal">
    <a class="nav-wordmark" href="/">ETIOVE</a>
    <div class="nav-links">
      <a class="nav-link" href="/">Inicio</a>
      <a class="nav-link nav-link--active" href="/blog/">Blog</a>
      <a class="nav-link" href="/comunidad.html">Comunidad</a>
      <a class="nav-cta" href="/">Descargar app</a>
    </div>
  </nav>

  <main class="page">
    <section class="profile-card">
      <p class="member-kicker">Etiove member card</p>
      <div id="profileAvatar" class="avatar">?</div>
      <p id="avatarHint" class="avatar-hint"></p>
      <h1 id="profileName" class="profile-name">Catador</h1>
      <p id="profileSince" class="profile-sub">Miembro desde hace poco</p>
      <p id="profileCounters" class="profile-counts">0 hilos <span>•</span> 0 respuestas <span>•</span> 0 comentarios</p>
      <p id="profileFollowers" class="profile-followers">0 seguidores</p>
      <p id="profileQuote" class="profile-quote">"Perfil público de la comunidad Etiove"</p>
      <div class="profile-actions">
        <button id="followBtn" class="pill-btn" type="button">Seguir</button>
        <button id="dmBtn" class="pill-btn" type="button">Mensaje directo</button>
      </div>
      <div id="ownerTools" class="profile-owner-tools" style="display:none;">
        <button id="editQuoteBtn" class="owner-btn" type="button">Editar frase</button>
      </div>
      <input id="photoInput" type="file" accept="image/*" style="display:none;" />
      <p id="profileStatus" class="profile-status"></p>
    </section>

    <div class="tabs" role="tablist" aria-label="Secciones del perfil">
      <button class="tab-btn active" type="button" data-tab="activity">Actividad reciente</button>
      <button class="tab-btn" type="button" data-tab="threads">Hilos</button>
      <button class="tab-btn" type="button" data-tab="replies">Respuestas</button>
      <button class="tab-btn" type="button" data-tab="blog">Blog</button>
      <button class="tab-btn" type="button" data-tab="followers">Seguidores</button>
      <button class="tab-btn" type="button" data-tab="following">Siguiendo</button>
      <button class="tab-btn" type="button" data-tab="messages">Mensajes</button>
      <button class="tab-btn" type="button" data-tab="stats">Estadisticas</button>
    </div>

    <section id="tabContent" class="feed" aria-live="polite"></section>
  </main>

  <script src="./profile.js"></script>
</body>
</html>
