<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Etiove</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="La página que buscas no existe. Vuelve a Etiove." />
    <link rel="canonical" href="https://etiove.com/404.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Etiove" />
    <meta name="theme-color" content="#21150f" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --ink: #1c120d;
        --ink-soft: #5d4030;
        --ink-muted: #9a7963;
        --cream: #f6efe7;
        --cream-alt: #fffaf5;
        --accent: #8f5e3b;
        --accent-deep: #5d4030;
        --border: #e4d3c2;
        --border-soft: rgba(228, 211, 194, 0.5);
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: var(--ink);
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--cream);
        padding: 24px;
        text-align: center;
        overflow-x: hidden;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.6;
      }
      .box {
        width: min(680px, 94vw);
        background: var(--cream-alt);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 60px 48px;
        box-shadow: 0 4px 40px rgba(28, 18, 13, 0.07);
        position: relative;
        z-index: 1;
      }
      .error-num {
        font-family: 'Playfair Display', serif;
        font-size: clamp(56px, 12vw, 88px);
        font-weight: 700;
        letter-spacing: 8px;
        line-height: 1;
        color: transparent;
        -webkit-text-stroke: 2px var(--ink);
        margin-bottom: 14px;
      }
      .error-label {
        font-size: 10px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 24px;
        font-weight: 600;
      }
      .copy {
        font-family: 'Playfair Display', serif;
        font-size: clamp(15px, 2vw, 17px);
        font-weight: 400;
        font-style: italic;
        color: var(--ink-muted);
        margin-bottom: 40px;
        line-height: 1.75;
        letter-spacing: 0.2px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        border: 1px solid var(--ink);
        color: #fff9f1;
        background: var(--ink);
        border-radius: 2px;
        padding: 14px 32px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        transition:
          background 0.3s,
          border-color 0.3s,
          transform 0.2s,
          box-shadow 0.3s;
      }
      .btn:hover {
        background: var(--accent-deep);
        border-color: var(--accent-deep);
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(28, 18, 13, 0.2);
      }
      .divider-line {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 0 auto 32px;
        max-width: 240px;
      }
      .divider-line::before,
      .divider-line::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .divider-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--accent);
      }

      .scroll-top {
        position: fixed;
        bottom: 24px;
        right: 20px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--accent);
        color: #fff9f1;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 18px rgba(28, 18, 13, 0.22);
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
        pointer-events: none;
        z-index: 200;
      }
      .scroll-top.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 40px;
        background: rgba(246, 239, 231, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-soft);
      }
      .nav-wordmark {
        font-family: 'Playfair Display', serif;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 4px;
        color: var(--ink);
        text-decoration: none;
        text-transform: uppercase;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 32px;
      }
      .nav-link {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--ink-muted);
        text-decoration: none;
        transition: color 0.3s;
      }
      .nav-link:hover {
        color: var(--accent);
      }
      @media (max-width: 768px) {
        nav {
          padding: 16px 20px;
        }
        .nav-links {
          display: none;
        }
      }

      /* ─── FOOTER (canonical) ─── */
      footer {
        position: relative;
        z-index: 1;
        padding: 32px 40px 32px;
        border-top: 1px solid var(--border-soft);
        display: grid;
        grid-template-columns: 1fr;
        gap: 0;
        align-items: start;
        background: #f6efe7;
        text-align: left;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
      }
      .footer-nav {
        grid-column: 1;
        grid-row: 1;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .footer-nav-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 28px;
      }
      .footer-nav-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--ink-muted);
        opacity: 0.6;
        width: 100%;
        margin-bottom: 2px;
      }
      .footer-nav-link {
        font-size: 13px;
        font-weight: 400;
        color: var(--ink-soft);
        text-decoration: none;
        transition: color 0.2s;
        letter-spacing: 0.2px;
        text-align: left;
      }
      .footer-nav-link:hover {
        color: var(--accent);
      }
      .footer-legal-link {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--ink-muted);
        text-decoration: none;
        opacity: 0.7;
        transition:
          opacity 0.2s,
          color 0.2s;
      }
      .footer-legal-link:hover {
        opacity: 1;
        color: var(--accent);
      }
      .footer-copy {
        font-size: 11px;
        color: var(--ink-muted);
        letter-spacing: 0.5px;
        font-weight: 300;
        grid-column: 1 / -1;
        grid-row: 2;
        margin-top: 40px;
        padding-top: 24px;
        padding-bottom: 16px;
        border-top: 1px solid var(--border-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
        text-align: left;
      }
      .footer-copy-center {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .footer-wordmark-sm {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 400;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--ink-soft);
      }
      .social-row-inline {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .social-row-inline .social-link {
        width: 38px;
        height: 38px;
      }
      .social-row-inline .social-link svg {
        width: 17px;
        height: 17px;
      }
      .social-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 50%;
        text-decoration: none;
        transition: all 0.3s;
        color: var(--ink-muted);
      }
      .social-link:hover {
        border-color: var(--accent);
        color: var(--accent);
        transform: translateY(-2px);
      }
      .social-link svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }
      @media (max-width: 768px) {
        footer {
          padding: 28px 20px;
        }
        .footer-copy {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  </head>
  <body>
    <nav>

      <div class="divider-line"><span class="divider-dot"></span></div>

    <button class="scroll-top" id="scrollTopBtn" aria-label="Volver arriba">

        viewBox="0 0 24 24"

        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>

    <script>
      const scrollTopBtn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', () => {
        scrollTopBtn.classList.toggle('visible', window.scrollY > 160);
      });
      scrollTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    </script>

        <span style="display: flex; gap: 20px; flex-wrap: wrap; align-items: center">
          <a class="footer-legal-link" href="/privacidad.html">Privacidad</a>
