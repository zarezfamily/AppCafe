<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Etiove</title>
  <meta name="description" content="La página que buscas no existe. Vuelve a Etiove." />
  <link rel="canonical" href="https://etiove.com/404.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <meta name="theme-color" content="#fffaf5" />
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:         #1c120d;
      --ink-soft:    #5d4030;
      --ink-muted:   #9a7963;
      --cream:       #f6efe7;
      --cream-alt:   #fffaf5;
      --accent:      #8f5e3b;
      --accent-deep: #5d4030;
      --border:      #e4d3c2;
      --border-soft: rgba(228, 211, 194, 0.5);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--cream);
      padding: 24px;
      text-align: center;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
    .box {
      width: min(680px, 94vw);
      background: var(--cream-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 60px 48px;
      box-shadow: 0 4px 40px rgba(28, 18, 13, 0.07);
      position: relative;
      z-index: 1;
    }
    .wordmark {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 7vw, 60px);
      font-weight: 300;
      letter-spacing: 12px;
      text-transform: uppercase;
      margin-bottom: 20px;
      color: var(--ink);
    }
    .code {
      font-size: 10px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      font-weight: 500;
    }
    .copy {
      font-family: 'Playfair Display', serif;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 400;
      color: var(--ink-soft);
      margin-bottom: 40px;
      font-style: italic;
      line-height: 1.5;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      border: 1px solid var(--ink);
      color: #fff9f1;
      background: var(--ink);
      border-radius: 2px;
      padding: 14px 32px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      transition: background 0.3s, border-color 0.3s, transform 0.2s, box-shadow 0.3s;
    }
    .btn:hover {
      background: var(--accent-deep);
      border-color: var(--accent-deep);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(28, 18, 13, 0.2);
    }
    .divider-line {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 0 auto 32px;
      max-width: 240px;
    }
    .divider-line::before, .divider-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff9f1;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(28, 18, 13, 0.22);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 200;
    }
    .scroll-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(246, 239, 231, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-soft);
    }
    .nav-wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 4px;
      color: var(--ink);
      text-decoration: none;
      text-transform: uppercase;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-link {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-link:hover { color: var(--accent); }
    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-wordmark" href="/">Etiove</a>
    <div class="nav-links">
      <a class="nav-link" href="/">Inicio</a>
      <a class="nav-link" href="/blog.html">Blog</a>
      <a class="nav-link" href="/comunidad.html">Comunidad</a>
    </div>
  </nav>

  <main class="box">
    <h1 class="wordmark">Etiove</h1>
    <p class="code">Error 404</p>
    <p class="copy">La página que buscas no existe.</p>
    <div class="divider-line"><span class="divider-dot"></span></div>
    <a class="btn" href="/">
      Volver al inicio
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </main>

  <button class="scroll-top" id="scrollTopBtn" aria-label="Volver arriba">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script>
    const scrollTopBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
      scrollTopBtn.classList.toggle('visible', window.scrollY > 160);
    });
    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
